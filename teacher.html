<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe School - Teacher Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans pb-20 text-gray-800">

    <header class="bg-indigo-900 text-white p-6 rounded-b-[40px] shadow-2xl text-center">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <a href="index.html" class="bg-black/20 px-4 py-2 rounded-xl text-xs font-bold hover:bg-black/40"><i class="fas fa-home"></i> ዋና ገጽ</a>
            <h1 class="text-xl font-black italic text-yellow-300">የመምህራን ማዕከል</h1>
            <div class="w-10"></div>
        </div>
    </header>

    <div id="teacher-login-box" class="max-w-md mx-auto m-6 bg-white p-6 rounded-[30px] shadow-lg border space-y-4">
        <h3 class="font-black text-xs text-indigo-900 italic border-b pb-2">🔐 መጀመሪያ በመምህር ስልክዎ ይግቡ</h3>
        <div class="space-y-2">
            <input type="tel" id="teacherPhoneInput" placeholder="የተመዘገበበት የመምህር ስልክ ቁጥር" class="w-full p-3 border rounded-xl font-bold bg-gray-50 outline-none text-xs">
        </div>
        <button onclick="loginTeacher()" class="w-full bg-indigo-900 text-white py-3 rounded-xl font-black text-xs shadow hover:bg-indigo-950">ግባ</button>
    </div>

    <main id="teacher-main-section" class="hidden max-w-2xl mx-auto p-4 space-y-4">
        <div class="bg-white p-4 rounded-2xl shadow border flex justify-between items-center">
            <div>
                <h2 id="display-teacher-name" class="font-black text-sm text-gray-800">---</h2>
                <p id="display-teacher-section" class="text-[11px] text-indigo-600 font-bold mt-0.5">---</p>
            </div>
            <button onclick="location.reload()" class="text-xs bg-rose-50 text-rose-600 px-3 py-1.5 rounded-xl font-bold border border-rose-200">ውጣ</button>
        </div>

        <div class="bg-white p-6 rounded-[30px] shadow-lg border space-y-3">
            <h3 class="font-black text-xs text-gray-700 italic border-b pb-2">📋 የእርስዎ ተማሪዎች ዝርዝር (አንዱን ይምረጡ)</h3>
            <div id="teacher-students-list" class="grid grid-cols-1 gap-2"></div>
        </div>

        <div id="report-form-section" class="hidden bg-white p-6 rounded-[30px] shadow-lg border space-y-4">
            <h3 id="selected-student-title" class="font-black text-xs text-emerald-700 italic border-b pb-2">✍️ ለተማሪ ሪፖርት መሙያ</h3>
            
            <div class="space-y-3 text-xs font-bold">
                <div>
                    <label class="block text-gray-500 mb-1 text-[11px]">📋 የተማሪ ክትትል ሁኔታ</label>
                    <select id="attendanceStatus" class="w-full p-2.5 border rounded-xl bg-gray-50 outline-none">
                        <option value="ገብቷል">🟢 ገብቷል (Present)</option>
                        <option value="አርፍዷል">🟡 አርፍዷል (Late)</option>
                        <option value="ቀርቷል">🔴 ቀርቷል (Absent)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-gray-500 mb-1 text-[11px]">💯 የተማሪ ውጤት / ማርክ (ካለ)</label>
                    <input type="text" id="studentScore" placeholder="ምሳሌ፦ 95/100 ወይም አልተሰጠም" class="w-full p-2.5 border rounded-xl bg-gray-50 outline-none">
                </div>

                <div>
                    <label class="block text-gray-500 mb-1 text-[11px]">🧠 የተማሪ ፀባይ / ስነ-ምግባር</label>
                    <select id="studentBehavior" class="w-full p-2.5 border rounded-xl bg-gray-50 outline-none">
                        <option value="በጣም ጥሩ">🌟 በጣም ጥሩ</option>
                        <option value="ጥሩ">👍 ጥሩ</option>
                        <option value="መስተካከል ያለበት">⚠️ መስተካከል ያለበት</option>
                    </select>
                </div>

                <div>
                    <label class="block text-gray-500 mb-1 text-[11px]">💬 የመምህሩ ተጨማሪ አስተያየት</label>
                    <textarea id="teacherComment" rows="2" placeholder="ስለ ተማሪው ውሎ ማስታወሻ እዚህ ይጻፉ..." class="w-full p-2.5 border rounded-xl bg-gray-50 outline-none resize-none"></textarea>
                </div>

                <div class="bg-slate-50 p-3 rounded-2xl border space-y-1">
                    <span class="text-[11px] text-gray-500 font-bold block">✍️ የመምህር ዲጂታል ፊርማ (እዚህ ላይ ይፈርሙ)</span>
                    <canvas id="teacherCanvas" class="w-full h-20 bg-white border border-gray-300 rounded-xl touch-none"></canvas>
                    <button type="button" onclick="clearTeacherCanvas()" class="text-[10px] text-rose-500 font-bold hover:underline block pt-1"><i class="fas fa-eraser"></i> ፊርማውን አጥፋ/ድገም</button>
                </div>
            </div>

            <button onclick="submitTeacherReport()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-black text-xs shadow hover:bg-emerald-700">ሪፖርቱን በይፋ ላክ</button>
        </div>
    </main>

    <script>
        // Firebase Configuration
        const firebaseConfig = { 
            apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", 
            authDomain: "safe-school-b3f87.firebaseapp.com", 
            projectId: "safe-school-b3f87", 
            storageBucket: "safe-school-b3f87.firebasestorage.app", 
            messagingSenderId: "43051328645", 
            appId: "1:43051328645:web:2664448d0b43a293daf5ec" 
        };
        firebase.initializeApp(firebaseConfig); 
        const db = firebase.firestore();

        let currentTeacherPhone = "";
        let currentTeacherName = "";
        let myStudents = [];
        let selectedStudentId = "";

        function loginTeacher() {
            const phone = document.getElementById('teacherPhoneInput').value.trim();
            if(!phone) return alert("እባክዎ ስልክ ቁጥርዎን ያስገቡ!");

            db.collection("students").where("teacherPhone", "==", phone).get().then((snap) => {
                if(snap.empty) {
                    alert("በዚህ ስልክ ቁጥር የተመዘገበ መምህር አልተገኘም!");
                    return;
                }
                
                currentTeacherPhone = phone;
                myStudents = [];
                snap.forEach(doc => myStudents.push({ id: doc.id, ...doc.data() }));

                // የመጀመሪያውን ተማሪ መረጃ ለመምህር ስም ማሳያ እንወስዳለን
                currentTeacherName = myStudents[0].teacherName;
                document.getElementById('display-teacher-name').innerText = `👨‍🏫 መምህር፦ ${currentTeacherName}`;
                document.getElementById('display-teacher-section').innerText = `🏫 ክፍል፦ ${myStudents[0].section || '5A'}`;

                document.getElementById('teacher-login-box').classList.add('hidden');
                document.getElementById('teacher-main-section').classList.remove('hidden');
                
                renderTeacherStudents();
            });
        }

        function renderTeacherStudents() {
            const container = document.getElementById('teacher-students-list');
            container.innerHTML = "";
            
            myStudents.forEach(s => {
                container.innerHTML += `
                    <button onclick="selectStudentForReport('${s.id}')" class="w-full text-left p-3.5 bg-slate-50 border rounded-xl font-bold text-xs flex justify-between items-center hover:bg-indigo-50 transition-all">
                        <span>👤 ${s.studentName}</span>
                        <i class="fas fa-chevron-right text-gray-400"></i>
                    </button>`;
            });
        }

        function selectStudentForReport(studentId) {
            selectedStudentId = studentId;
            const student = myStudents.find(s => s.id === studentId);
            if(!student) return;

            document.getElementById('selected-student-title').innerText = `✍️ ለ${student.studentName} የዕለት ሪፖርት መሙያ`;
            document.getElementById('report-form-section').classList.remove('hidden');
            
            // ፎርሙን ባዶ እናደርጋለን
            document.getElementById('studentScore').value = "";
            document.getElementById('teacherComment').value = "";
            
            // የፊርማ ሰሌዳውን በኮምፒውተርም በስልክም እንዲሰራ እናነቃዋለን
            setTimeout(() => { setupTeacherCanvas(); }, 100);
        }

        // 📱 በኮምፒውተርም በስልክም (Touch) በትክክል የሚፈርም አዲሱ የፈንክሽን አመክንዮ
        function setupTeacherCanvas() {
            const canvas = document.getElementById('teacherCanvas'); if(!canvas) return; const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.clientWidth; canvas.height = 80;
            
            // የፊርማ መስመር ውበት
            ctx.strokeStyle = "#1e3a8a"; ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.lineJoin = "round";
            let drawing = false;

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                if (e.touches && e.touches.length > 0) {
                    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
                }
                return { x: e.offsetX, y: e.offsetY };
            }

            function startDraw(e) { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
            function moveDraw(e) { if(!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }
            function stopDraw() { drawing = false; }

            // ማውዝ (ኮምፒውተር)
            canvas.onmousedown = startDraw; canvas.onmousemove = moveDraw; canvas.onmouseup = stopDraw; canvas.onmouseleave = stopDraw;
            // ንክኪ (ሞባይል ስልክ)
            canvas.addEventListener('touchstart', startDraw, { passive: false });
            canvas.addEventListener('touchmove', moveDraw, { passive: false });
            canvas.addEventListener('touchend', stopDraw, { passive: false });
        }

        function clearTeacherCanvas() {
            const canvas = document.getElementById('teacherCanvas'); if(!canvas) return;
            const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function isCanvasBlank() {
            const c = document.getElementById('teacherCanvas');
            return c.getContext('2d').getImageData(0,0,c.width,c.height).data.every(p => p === 0);
        }

        function submitTeacherReport() {
            if(!selectedStudentId) return alert("እባክዎ መጀመሪያ ተማሪ ይምረጡ!");
            if(isCanvasBlank()) return alert("እባክዎ በመጀመሪያ ፊርማዎን ያኑሩ!");

            const status = document.getElementById('attendanceStatus').value;
            const score = document.getElementById('studentScore').value.trim();
            const behavior = document.getElementById('studentBehavior').value;
            const comment = document.getElementById('teacherComment').value.trim();
            const signatureData = document.getElementById('teacherCanvas').toDataURL();
            const todayStr = new Date().toLocaleDateString('am-ET');

            const newReport = {
                date: todayStr,
                status: status,
                score: score || "አልተሰጠም",
                behavior: behavior,
                teacherComment: comment,
                teacherSignature: signatureData,
                parentComment: "" // ወላጅ ወደፊት እንዲሞላው ባዶ ይደረጋል
            };

            // የቀድሞውን ታሪክ አምጥተን አዲሱን እንጨምርበታለን
            db.collection("students").doc(selectedStudentId).get().then((doc) => {
                let currentHistory = doc.data().attendanceHistory || [];
                currentHistory.push(newReport);

                return db.collection("students").doc(selectedStudentId).update({
                    attendanceHistory: currentHistory
                });
            }).then(() => {
                alert("የዕለት ሪፖርቱ በተሳካ ሁኔታ ተልኳል!");
                clearTeacherCanvas();
                document.getElementById('report-form-section').classList.add('hidden');
                loginTeacher(); // መረጃውን በቅጽበት ለማደስ
            }).catch(err => alert("ስህተት አጋጥሟል፦ " + err));
        }
    </script>
</body>
</html>
