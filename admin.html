<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe School - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans pb-20 text-gray-800">

    <header class="bg-indigo-900 text-white p-6 rounded-b-[40px] shadow-2xl text-center">
        <h1 class="text-xl font-black italic text-yellow-200">የአስተዳዳሪ (Admin) ማዕከል</h1>
        <p class="text-xs mt-1 opacity-80">የክፍያ ደረሰኞች መላኪያና ቁጥጥር</p>
    </header>

    <main class="max-w-2xl mx-auto p-4 space-y-6">
        <div class="bg-white p-6 rounded-[30px] shadow-lg border space-y-4">
            <h3 class="font-black text-xs text-indigo-900 italic border-b pb-2">🧾 አዲስ የክፍያ ደረሰኝ መላኪያ</h3>
            
            <div class="space-y-3 text-xs font-bold">
                <div>
                    <label class="block text-gray-500 mb-1">የተማሪው የFirebase ID (Document ID)</label>
                    <input type="text" id="admStudentId" placeholder="ምሳሌ፦ student_01" class="w-full p-3 border rounded-xl bg-gray-50 outline-none">
                </div>
                <div>
                    <label class="block text-gray-500 mb-1">የደረሰኝ ቁጥር (Receipt No)</label>
                    <input type="text" id="admReceiptNo" placeholder="ምሳሌ፦ REC-9921" class="w-full p-3 border rounded-xl bg-gray-50 outline-none">
                </div>
                <div>
                    <label class="block text-gray-500 mb-1">የክፍያ ዓይነት (Fee Type)</label>
                    <select id="admFeeType" class="w-full p-3 border rounded-xl bg-gray-50 outline-none">
                        <option value="የወር ክፍያ">የወር ክፍያ</option>
                        <option value="የምዝገባ ክፍያ">የምዝገባ ክፍያ</option>
                        <option value="የትራንስፖርት ክፍያ">የትራንስፖርት ክፍያ</option>
                        <option value="የመጽሐፍ ክፍያ">የመጽሐፍ ክፍያ</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-500 mb-1">የተከፈለ ገንዘብ መጠን (Amount in ETB)</label>
                    <input type="number" id="admAmount" placeholder="ምሳሌ፦ 3500" class="w-full p-3 border rounded-xl bg-gray-50 outline-none">
                </div>
            </div>

            <button onclick="sendAdminReceipt()" class="w-full bg-indigo-900 text-white py-3 rounded-xl font-black text-xs shadow hover:bg-indigo-950">🧾 ደረሰኙን ለወላጅ ላክ</button>
        </div>
    </main>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", 
            authDomain: "safe-school-b3f87.firebaseapp.com", 
            projectId: "safe-school-b3f87", 
            storageBucket: "safe-school-b3f87.firebasestorage.app", 
            messagingSenderId: "43051328645", 
            appId: "1:43051328645:web:2664448d0b43a293daf5ec" 
        };
        firebase.initializeApp(firebaseConfig); 
        const db = firebase.firestore();

        function sendAdminReceipt() {
            const sId = document.getElementById('admStudentId').value.trim();
            const rNo = document.getElementById('admReceiptNo').value.trim();
            const fType = document.getElementById('admFeeType').value;
            const amt = document.getElementById('admAmount').value.trim();
            const todayStr = new Date().toLocaleDateString('am-ET');

            if(!sId || !rNo || !amt) return alert("እባክዎ ሁሉንም መረጃዎች በትክክል ይሙሉ!");

            db.collection("students").doc(sId).update({
                receiptNo: rNo,
                feeType: fType,
                paidAmount: amt,
                receiptDate: todayStr,
                receiptConfirmed: false // አዲስ ስለሆነ ገና አልተፈረመም
            }).then(() => {
                alert("🎉 የክፍያ ደረሰኙ በተሳካ ሁኔታ ተልኳል! ወላጁ ጋር ቀጥታ ይታያል።");
                document.getElementById('admStudentId').value = "";
                document.getElementById('admReceiptNo').value = "";
                document.getElementById('admAmount').value = "";
            }).catch(err => alert("ስህተት አጋጥሟል (ተማሪው መኖሩን ያረጋግጡ)፦ " + err));
        }
    </script>
</body>
</html>
