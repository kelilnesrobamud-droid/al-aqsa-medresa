<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe School - Parent Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 font-sans pb-10">

    <div class="bg-[#0d7a70] p-8 rounded-b-[50px] text-white text-center shadow-2xl">
        <h1 class="text-xl font-black italic text-yellow-400 mb-4">የወላጅ መረጃ ማዕከል</h1>
        <div class="max-w-sm mx-auto">
            <input type="tel" id="pIn" placeholder="ስልክ ቁጥርዎን ያስገቡ..." class="w-full p-4 rounded-3xl text-gray-800 text-center font-bold outline-none shadow-xl border-none">
            <button onclick="fetchData()" class="w-full mt-3 bg-indigo-600 p-4 rounded-3xl font-black shadow-lg italic text-white">መረጃ አሳይ</button>
        </div>
    </div>

    <div id="results" class="p-4 max-w-4xl mx-auto mt-4"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", authDomain: "safe-school-b3f87.firebaseapp.com", projectId: "safe-school-b3f87", storageBucket: "safe-school-b3f87.firebasestorage.app", messagingSenderId: "43051328645", appId: "1:43051328645:web:2664448d0b43a293daf5ec" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function fetchData() {
            const phone = document.getElementById('pIn').value.trim();
            db.collection("students").where("parentPhone", "==", phone).onSnapshot(snap => {
                const res = document.getElementById('results');
                res.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    const history = data.attendanceHistory || [];
                    
                    res.innerHTML = `
                        <div class="bg-white rounded-[35px] shadow-lg p-6 border">
                            <h2 class="text-xl font-black text-[#0d7a70] mb-4 italic">ተማሪ፦ ${data.studentName}</h2>
                            
                            <!-- 🏛️ የአድሚን መረጃ ክፍል -->
                            <div class="mb-6 p-4 bg-sky-50 rounded-2xl border border-sky-100">
                                <h3 class="text-[11px] font-black text-sky-800 uppercase italic mb-2">🏛️ የአድሚን አስተዳደራዊ መረጃ</h3>
                                <div class="flex justify-between items-center text-sm">
                                    <span class="font-bold text-gray-600">የክፍያ ሁኔታ፦</span>
                                    <span class="${data.paymentStatus === 'paid' ? 'text-emerald-600' : 'text-rose-600'} font-black">${data.paymentStatus === 'paid' ? 'ተከፍሏል' : 'አልተከፈለም'}</span>
                                </div>
                            </div>

                            <!-- 👨‍🏫 የመምህር መረጃ ክፍል (ሪፖርት) -->
                            <div class="mb-4">
                                <div class="flex justify-between items-center mb-2">
                                    <h3 class="text-[11px] font-black text-indigo-800 uppercase italic">👨‍🏫 የመምህር አካዳሚክ ሪፖርት</h3>
                                    <select id="parent-filter" onchange="renderReports(${JSON.stringify(history).replace(/"/g, '&quot;')})" class="text-[10px] p-1 border rounded-lg font-bold">
                                        <option value="today">📅 የዛሬ</option>
                                        <option value="month">🗓️ የዚህ ወር</option>
                                        <option value="year">⏳ የዚህ ዓመት</option>
                                    </select>
                                </div>
                                <div id="report-view" class="grid grid-cols-2 gap-3"></div>
                            </div>
                        </div>
                    `;
                    renderReports(history);
                });
            });
        }

        function renderReports(history) {
            const filter = document.getElementById('parent-filter')?.value || 'today';
            const today = new Date().toLocaleDateString('en-CA');
            const now = new Date();
            
            const filtered = history.filter(h => {
                const hDate = new Date(h.date);
                if(filter === 'today') return h.date === today;
                if(filter === 'month') return hDate.getMonth() === now.getMonth() && hDate.getFullYear() === now.getFullYear();
                return hDate.getFullYear() === now.getFullYear();
            });

            const container = document.getElementById('report-view');
            container.innerHTML = filtered.length ? filtered.map(h => `
                <div class="bg-gray-50 p-3 rounded-2xl text-[11px] border">
                    <p class="font-bold text-gray-500">${h.date}</p>
                    <p class="font-black text-indigo-900">${h.status}</p>
                    <p class="text-[10px] mt-1 italic">ፀባይ፦ <span class="text-emerald-600">${h.behavior}</span> | ውጤት፦ <span class="text-blue-600">${h.score}</span></p>
                </div>
            `).join('') : '<p class="text-xs text-gray-400 italic">መረጃ አልተመዘገበም</p>';
        }
    </script>
</body>
</html>
