<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe School - Parent Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans pb-20 text-gray-800">

    <header class="bg-amber-600 text-white p-6 rounded-b-[40px] shadow-2xl text-center">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <a href="index.html" class="bg-black/20 px-4 py-2 rounded-xl text-xs font-bold hover:bg-black/40"><i class="fas fa-home"></i> ዋና ገጽ</a>
            <h1 class="text-xl font-black italic text-yellow-200">የወላጆች መቆጣጠሪያ ማዕከል</h1>
            <div class="w-10"></div>
        </div>
    </header>

    <div id="parent-login-box" class="max-w-md mx-auto m-6 bg-white p-6 rounded-[30px] shadow-lg border space-y-4">
        <h3 class="font-black text-xs text-amber-700 italic border-b pb-2">🔐 በወላጅ ስልክ ቁጥርዎ ይግቡ</h3>
        <div class="space-y-2">
            <input type="tel" id="parentPhoneInput" placeholder="የተመዘገበበት የወላጅ ስልክ ቁጥር" class="w-full p-3 border rounded-xl font-bold bg-gray-50 outline-none text-xs">
        </div>
        <button onclick="loginParent()" class="w-full bg-amber-600 text-white py-3 rounded-xl font-black text-xs shadow hover:bg-amber-700">መረጃዎችን አሳይ</button>
    </div>

    <main id="parent-main-section" class="hidden max-w-2xl mx-auto p-4 space-y-4">
        <div class="bg-white p-4 rounded-2xl shadow border flex justify-between items-center">
            <div>
                <h2 id="display-student-name" class="font-black text-sm text-gray-800">---</h2>
                <p id="display-student-section" class="text-[11px] text-amber-600 font-bold mt-0.5">---</p>
            </div>
            <button onclick="location.reload()" class="text-xs bg-rose-50 text-rose-600 px-3 py-1.5 rounded-xl font-bold border border-rose-200">ውጣ</button>
        </div>

        <div id="today-report-box" class="hidden bg-white p-6 rounded-[30px] shadow-lg border space-y-4">
            <div class="border-b pb-2 flex justify-between items-center">
                <h3 class="font-black text-xs text-emerald-700 italic">📅 የዛሬ የዕለት ውሎ መረጃ</h3>
                <span id="report-date-badge" class="text-[10px] bg-slate-100 text-gray-600 px-2 py-0.5 rounded-md font-bold">---</span>
            </div>

            <button onclick="toggleParentReportInputs()" id="btn-parent-toggle" class="w-full bg-slate-800 text-white py-2.5 rounded-xl text-xs font-black shadow-sm flex justify-center items-center gap-2 transition-all">
                <span>📋 የዛሬ የዕለት ውሎ ደረሰኝ/ሪፖርት ክፈት</span> <i id="parent-toggle-icon" class="fas fa-chevron-down"></i>
            </button>

            <div id="parent-report-inputs-container" class="hidden space-y-4 border-t pt-3">
                
                <div>
                    <label class="block text-gray-400 mb-1 text-[11px] font-bold">📋 የተማሪ ክትትል ሁኔታ</label>
                    <div id="view-attendance-status" class="w-full p-3 border rounded-xl bg-gray-50 font-black text-xs text-indigo-900">---</div>
                </div>

                <div>
                    <label class="block text-gray-400 mb-1 text-[11px] font-bold">🧠 የተማሪ ፀባይ / ስነ-ምግባ</label>
                    <div id="view-student-behavior" class="w-full p-3 border rounded-xl bg-gray-50 font-black text-xs text-gray-800">---</div>
                </div>

                <div>
                    <label class="block text-gray-400 mb-1 text-[11px] font-bold">💯 የተማሪ ውጤት / ማርክ</label>
                    <div id="view-student-score" class="w-full p-3 border rounded-xl bg-gray-50 font-black text-xs text-blue-900">---</div>
                </div>

                <div>
                    <label class="block text-gray-400 mb-1 text-[11px] font-bold">💬 የመምህሩ ተጨማሪ አስተያየት</label>
                    <div id="view-teacher-comment" class="w-full p-3 border rounded-xl bg-gray-50 font-bold text-xs text-gray-700 italic bg-slate-50">---</div>
                </div>

                <div id="parent-input-zone" class="space-y-3 border-t pt-3">
                    <h4 class="font-black text-xs text-amber-700 italic">✍️ የወላጅ ምላሽ መስጫ ፎርም</h4>
                    
                    <div>
                        <label class="block text-gray-500 mb-1 text-[11px] font-bold">💬 የወላጅ አስተያየት (እዚህ ይጻፉ)</label>
                        <textarea id="parentCommentInput" rows="2" placeholder="ለቤት ስራ ወይም ለልጅዎ ውሎ ምላሽ እዚህ ይጻፉ..." class="w-full p-2.5 border rounded-xl bg-gray-50 font-bold text-xs outline-none resize-none"></textarea>
                    </div>

                    <div class="bg-amber-50/50 p-3 rounded-2xl border border-amber-200 space-y-1">
                        <span class="text-[11px] text-amber-900 font-bold block">✍️ የወላጅ ዲጂታል ፊርማ (እዚህ ላይ ይፈርሙ)</span>
                        <canvas id="parentCanvas" class="w-full h-20 bg-white border border-amber-300 rounded-xl touch-none"></canvas>
                        <button type="button" onclick="clearParentCanvas()" class="text-[10px] text-rose-500 font-bold hover:underline block pt-1"><i class="fas fa-eraser"></i> ፊርማውን አጥፋ/ድገም</button>
                    </div>

                    <button onclick="submitParentResponse()" class="w-full bg-amber-600 text-white py-3 rounded-xl font-black text-xs shadow hover:bg-amber-700">አስተያየት እና ፊርማዬን ላክ</button>
                </div>

                <div id="parent-done-zone" class="hidden bg-emerald-50 p-4 rounded-2xl border border-emerald-200 text-center text-xs font-bold text-emerald-800">
                    🎉 ለዛሬው ሪፖርት አስተያየት እና ፊርማዎን በተሳካ ሁኔታ ልከዋል!
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[30px] shadow-lg border space-y-3">
            <h4 class="font-black text-xs text-slate-800 italic border-b pb-2">📊 የልጅዎ ያለፉ የሪፖርት መዝገቦች</h4>
            <div class="flex gap-2 border-b pb-1 text-xs font-black">
                <button onclick="switchParentTab('daily')" id="tab-daily" class="px-3 py-1.5 bg-indigo-900 text-white rounded-t-xl">📅 ዕለታዊ</button>
                <button onclick="switchParentTab('monthly')" id="tab-monthly" class="px-3 py-1.5 bg-gray-200 text-gray-600 rounded-t-xl">📆 ወርሃዊ</button>
                <button onclick="switchParentTab('yearly')" id="tab-yearly" class="px-3 py-1.5 bg-gray-200 text-gray-600 rounded-t-xl">🏛️ ዓመታዊ</button>
            </div>
            <div class="overflow-x-auto rounded-xl border">
                <table class="w-full text-[11px] text-center">
                    <thead class="bg-slate-800 text-white font-bold">
                        <tr>
                            <th class="p-2">ቀን</th>
                            <th class="p-2">ክትትል</th>
                            <th class="p-2">ውጤት</th>
                            <th class="p-2">ፀባይ</th>
                            <th class="p-2">የመምህር አስተያየት</th>
                            <th class="p-2 text-amber-300">የእርስዎ አስተያየት</th>
                        </tr>
                    </thead>
                    <tbody id="parent-history-table-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // Firebase Configuration
        const firebaseConfig = { 
            apiKey: "AIzaSyBKw3ektgxdfvqcO-JHzJwjvfSkc-K_41A", 
            authDomain: "safe-school-b3f87.firebaseapp.com", 
            projectId: "safe-school-b3f87", 
            storageBucket: "safe-school-b3f87.firebasestorage.app", 
            messagingSenderId: "43051328645", 
            appId: "1:43051328645:web:2664448d0b43a293daf5ec" 
        };
        firebase.initializeApp(firebaseConfig); 
        const db = firebase.firestore();

        let currentStudentId = "";
        let studentData = null;
        let attendanceHistory = [];
        let isReportLoaded = false;

        function loginParent() {
            const phone = document.getElementById('parentPhoneInput').value.trim();
            if(!phone) return alert("እባክዎ መጀመሪያ የወላጅ ስልክ ቁጥርዎን ያስገቡ!");

            db.collection("students").where("parentPhone", "==", phone).get().then((snap) => {
                if(snap.empty) {
                    return alert("በዚህ ስልክ ቁጥር የተመዘገበ ተማሪ አልተገኘም!");
                }

                snap.forEach(doc => {
                    currentStudentId = doc.id;
                    studentData = doc.data();
                });

                document.getElementById('display-student-name').innerText = `👤 ተማሪ፦ ${studentData.studentName}`;
                document.getElementById('display-student-section').innerText = `🏫 ክፍል፦ ${studentData.section || '5A'}`;

                document.getElementById('parent-login-box').classList.add('hidden');
                document.getElementById('parent-main-section').classList.remove('hidden');

                attendanceHistory = studentData.attendanceHistory || [];
                renderTodayReport();
                switchParentTab('daily');
            });
        }

        function renderTodayReport() {
            const todayStr = new Date().toLocaleDateString('am-ET');
            const todayReport = attendanceHistory.find(r => r.date === todayStr);
            const reportBox = document.getElementById('today-report-box');

            if(!todayReport) {
                reportBox.classList.remove('hidden');
                reportBox.innerHTML = `<p class="text-center p-4 text-gray-400 italic text-xs">⚠️ ለዛሬ ቀን ከመምህሩ እስካሁን የተላከ የዕለት ሪፖርት የለም።</p>`;
                isReportLoaded = false;
                return;
            }

            isReportLoaded = true;
            reportBox.classList.remove('hidden');
            document.getElementById('report-date-badge').innerText = todayReport.date;
            
            document.getElementById('view-attendance-status').innerText = `🟢 ${todayReport.status}`;
            document.getElementById('view-student-behavior').innerText = todayReport.behavior || "አልተጻፈም";
            document.getElementById('view-student-score').innerText = todayReport.score || "አልተሰጠም";
            document.getElementById('view-teacher-comment').innerText = todayReport.teacherComment || "የመምህር አስተያየት የለም";

            document.getElementById('parent-report-inputs-container').classList.add('hidden');
            document.getElementById('parent-toggle-icon').className = "fas fa-chevron-down";

            if(todayReport.parentComment || todayReport.parentSignature) {
                document.getElementById('parent-input-zone').classList.add('hidden');
                document.getElementById('parent-done-zone').classList.remove('hidden');
            } else {
                document.getElementById('parent-input-zone').classList.remove('hidden');
                document.getElementById('parent-done-zone').classList.add('hidden');
            }
        }

        // 🎛️ የወላጅ ደረሰኝ በተን መቆጣጠሪያ (Toggle) - እዚህ ጋ ነው የተስተካከለው!
        function toggleParentReportInputs() {
            if(!isReportLoaded) return;
            const container = document.getElementById('parent-report-inputs-container');
            const icon = document.getElementById('parent-toggle-icon');
            
            if(container.classList.contains('hidden')) {
                container.classList.remove('hidden');
                icon.className = "fas fa-chevron-up";
                
                // በተኑ ሲነካ ካንቫሱ ሰርቶ እንዲዘጋጅ እናደርጋለን
                const todayStr = new Date().toLocaleDateString('am-ET');
                const todayReport = attendanceHistory.find(r => r.date === todayStr);
                if(todayReport && !todayReport.parentSignature) {
                    setTimeout(() => { setupParentCanvas(); }, 150);
                }
            } else {
                container.classList.add('hidden');
                icon.className = "fas fa-chevron-down";
            }
        }

        function processAutoArchive(historyArray) {
            const todayStr = new Date().toLocaleDateString('am-ET');
            const daily = []; const monthly = []; const yearly = [];
            if (!historyArray || historyArray.length === 0) return { daily, monthly, yearly };

            historyArray.forEach(record => {
                if (record.date === todayStr) daily.push(record);
                monthly.push(record);
                yearly.push(record);
            });
            return { daily, monthly, yearly };
        }

        function switchParentTab(type) {
            const btnDaily = document.getElementById('tab-daily');
            const btnMonthly = document.getElementById('tab-monthly');
            const btnYearly = document.getElementById('tab-yearly');
            const tbody = document.getElementById('parent-history-table-body');
            
            [btnDaily, btnMonthly, btnYearly].forEach(b => b.className = "px-3 py-1.5 bg-gray-200 text-gray-600 rounded-t-xl font-black text-xs");
            document.getElementById(`tab-${type}`).className = "px-3 py-1.5 bg-indigo-900 text-white rounded-t-xl font-black text-xs";
            
            const archived = processAutoArchive(attendanceHistory);
            let targetList = type === 'daily' ? archived.daily : (type === 'monthly' ? archived.monthly : archived.yearly);

            tbody.innerHTML = "";
            if(targetList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-4 text-gray-400 italic text-xs">በዚህ ክፍል ምንም መረጃ የለም።</td></tr>`;
                return;
            }
            targetList.slice().reverse().forEach(h => {
                tbody.innerHTML += `
                    <tr class="border-b text-gray-700 font-bold text-[10px]">
                        <td class="p-2 bg-gray-50">${h.date}</td>
                        <td class="p-2 text-indigo-700">${h.status}</td>
                        <td class="p-2 text-blue-600 font-black">${h.score || '---'}</td>
                        <td class="p-2 text-emerald-600">${h.behavior || '---'}</td>
                        <td class="p-2 text-left italic">"${h.teacherComment || ''}"</td>
                        <td class="p-2 text-left text-amber-700 font-black italic">"${h.parentComment || 'የለም'}"</td>
                    </tr>`;
            });
        }

        // 📱 የፊርማ ሰሌዳውን በትክክል የሚያነቃ ፈንክሽን
        function setupParentCanvas() {
            const canvas = document.getElementById('parentCanvas'); 
            if(!canvas) return; 
            const ctx = canvas.getContext('2d');
            
            // የዊድዝ መጠን ማስተካከያ
            canvas.width = canvas.parentElement.clientWidth; 
            canvas.height = 80;
            
            ctx.strokeStyle = "#b45309"; 
            ctx.lineWidth = 3; 
            ctx.lineCap = "round"; 
            ctx.lineJoin = "round";
            
            let drawing = false;

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                if (e.touches && e.touches.length > 0) {
                    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
                }
                return { x: e.offsetX, y: e.offsetY };
            }

            function startDraw(e) { 
                e.preventDefault(); 
                drawing = true; 
                const p = getPos(e); 
                ctx.beginPath(); 
                ctx.moveTo(p.x, p.y); 
            }
            
            function moveDraw(e) { 
                if(!drawing) return; 
                e.preventDefault(); 
                const p = getPos(e); 
                ctx.lineTo(p.x, p.y); 
                ctx.stroke(); 
            }
            
            function stopDraw() { drawing = false; }

            canvas.onmousedown = startDraw; 
            canvas.onmousemove = moveDraw; 
            canvas.onmouseup = stopDraw; 
            canvas.onmouseleave = stopDraw;
            
            canvas.addEventListener('touchstart', startDraw, { passive: false });
            canvas.addEventListener('touchmove', moveDraw, { passive: false });
            canvas.addEventListener('touchend', stopDraw, { passive: false });
        }

        function clearParentCanvas() {
            const canvas = document.getElementById('parentCanvas'); if(!canvas) return;
            const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function isCanvasBlank() {
            const c = document.getElementById('parentCanvas');
            return c.getContext('2d').getImageData(0,0,c.width,c.height).data.every(p => p === 0);
        }

        function submitParentResponse() {
            if(isCanvasBlank()) return alert("እባክዎ በመጀመሪያ ፊርማዎን በሰሌዳው ላይ ያኑሩ!");

            const pComment = document.getElementById('parentCommentInput').value.trim();
            const pSignature = document.getElementById('parentCanvas').toDataURL();
            const todayStr = new Date().toLocaleDateString('am-ET');

            let updatedHistory = attendanceHistory.map(r => {
                if(r.date === todayStr) {
                    r.parentComment = pComment || "ታይቷል";
                    r.parentSignature = pSignature;
                }
                return r;
            });

            db.collection("students").doc(currentStudentId).update({
                attendanceHistory: updatedHistory
            }).then(() => {
                alert("የእርስዎ አስተያየት እና ፊርማ ለትምህርት ቤቱ ደርሷል!");
                loginParent();
            }).catch(err => alert("ስህተት አጋጥሟል፦ " + err));
        }
    </script>
</body>
</html>
